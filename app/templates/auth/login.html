<!DOCTYPE html>
<html lang="es" data-theme="semi" data-size="md">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0e1526">
    <title>Iniciar sesión — alerta.pe</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/phosphor-icons@1.4.2/src/css/icons.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <style>
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            overflow: hidden;
            position: relative;
        }

        /* Gradiente animado de fondo */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(217,30,24,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(212,160,18,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(30,90,217,0.05) 0%, transparent 50%);
            animation: bgShift 12s ease-in-out infinite alternate;
        }
        @keyframes bgShift {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Partículas sutiles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--red);
            border-radius: 50%;
            opacity: 0;
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { opacity: 0; transform: translateY(0) scale(1); }
            50% { opacity: 0.4; transform: translateY(-120px) scale(1.5); }
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            padding: 40px 28px;
            text-align: center;
        }

        .login-logo {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--red);
            text-shadow: 0 0 40px rgba(217,30,24,0.4), 0 0 80px rgba(217,30,24,0.15);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .login-logo i { margin-right: 6px; font-size: 1.8rem; }

        .login-subtitle {
            color: var(--text-3);
            font-size: 0.85rem;
            margin-bottom: 36px;
        }

        .login-form { display: flex; flex-direction: column; gap: 16px; }

        .input-group {
            position: relative;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-3);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-mid);
            border: 1px solid var(--border);
            border-radius: var(--radius-input);
            color: var(--text-1);
            font-size: 1.05rem;
            font-family: var(--font-sans);
            transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
            outline: none;
            box-sizing: border-box;
        }
        .input-group input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(217,30,24,0.15);
        }
        .input-group input::placeholder { color: var(--text-3); opacity: 0.5; }
        .input-group .input-icon {
            position: absolute;
            right: 14px;
            bottom: 14px;
            color: var(--text-3);
            font-size: 1.1rem;
        }

        .login-btn {
            padding: 14px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: var(--radius-input);
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all 0.25s var(--ease);
            margin-top: 4px;
        }
        .login-btn:hover { background: #c41a15; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(217,30,24,0.3); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .login-bio {
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-input);
            color: var(--text-2);
            font-size: 0.9rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all 0.25s var(--ease);
            display: none; /* Se muestra solo si WebAuthn disponible */
        }
        .login-bio i { margin-right: 6px; }
        .login-bio:hover { border-color: var(--gold); color: var(--gold); }

        .login-link {
            color: var(--text-3);
            font-size: 0.8rem;
            text-decoration: none;
            margin-top: 12px;
            display: inline-block;
            transition: color 0.2s;
        }
        .login-link:hover { color: var(--gold); }

        .login-error {
            background: rgba(217,30,24,0.1);
            border: 1px solid rgba(217,30,24,0.3);
            border-radius: var(--radius-input);
            padding: 10px 14px;
            color: var(--red);
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="login-card">
        <div class="login-logo"><i class="ph-bell-ringing"></i>alerta.pe</div>
        <p class="login-subtitle">Verificación inteligente de pagos para contadores</p>

        <div class="login-error" id="login-error"></div>

        <form class="login-form" id="login-form">
            <div class="input-group">
                <label for="dni">DNI</label>
                <input type="text" id="dni" name="dni" inputmode="numeric" pattern="\d{8}"
                       maxlength="8" placeholder="12345678" autocomplete="username" required>
                <span class="input-icon"><i class="ph-identification-card"></i></span>
            </div>

            <div class="input-group">
                <label for="clave">Clave</label>
                <input type="password" id="clave" name="clave" minlength="8"
                       placeholder="Mínimo 8 caracteres" autocomplete="current-password" required>
                <span class="input-icon"><i class="ph-lock"></i></span>
            </div>

            <button type="submit" class="login-btn" id="login-btn">
                Ingresar
            </button>

            <button type="button" class="login-bio" id="login-bio">
                <i class="ph-fingerprint"></i> Ingresar con huella / Face ID
            </button>
        </form>

        <a href="/reset-clave" class="login-link">¿Olvidaste tu clave?</a>
    </div>

    <!-- Sonido login exitoso -->
    <audio id="sound-login" preload="auto">
        <source src="/static/audio/successfinish-ui-sound.mp3" type="audio/mpeg">
    </audio>

    <script src="/static/js/auth.js"></script>
    <script>
        // Generar partículas
        const pc = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = (60 + Math.random() * 40) + '%';
            p.style.animationDelay = (Math.random() * 8) + 's';
            p.style.animationDuration = (6 + Math.random() * 6) + 's';
            if (Math.random() > 0.5) p.style.background = 'var(--gold)';
            pc.appendChild(p);
        }
    </script>
</body>
</html>
